name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      # Shift Left: 로컬과 CI가 완전히 같은 명령 (engineering-standards §2.3)
      - run: bun run verify
      - name: Run pando self-benchmark
        run: |
          bun run benchmark:self -- \
            --output-dir "$RUNNER_TEMP/pando-self-benchmark" \
            --run-id "ci-${{ github.run_id }}-${{ github.run_attempt }}"
      - name: Append benchmark summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/pando-self-benchmark/benchmark.md" ]; then
            cat "$RUNNER_TEMP/pando-self-benchmark/benchmark.md" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment benchmark on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -f "$RUNNER_TEMP/pando-self-benchmark/benchmark.json" ]; then
            bun run benchmark:comment -- \
              --summary "$RUNNER_TEMP/pando-self-benchmark/benchmark.json" \
              --pr "${{ github.event.pull_request.number }}"
          fi
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: pando-self-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/pando-self-benchmark
          if-no-files-found: warn
