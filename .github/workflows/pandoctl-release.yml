name: Release pandoctl

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm. Leave false for a packaging dry run.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  package:
    name: Build, smoke, and publish pandoctl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - run: bun run verify

      - run: bun run build:pandoctl

      - run: bun run smoke:pandoctl-pack

      - name: Dry-run npm package
        if: ${{ inputs.publish != true }}
        working-directory: packages/pandoctl
        run: npm publish --dry-run

      - name: Publish npm package
        if: ${{ inputs.publish == true }}
        working-directory: packages/pandoctl
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
