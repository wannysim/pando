# 오케스트레이터 전역 설정 — docs/design-v2-multi-repo.md §3.1

global_concurrency: 6 # 전체 in-flight 상한. 첫 live smoke는 실행 옵션에서 2~3으로 낮춘다.
worktree_root: ~/.worktrees # .ai-skills worktree-dispatch §1 규약과 동일
skills_root: ~/.ai-skills

intake:
  jira_poll_interval_sec: 60
  jira_jql: 'assignee = currentUser() AND status = "To Do" AND labels = agent-ready'
  briefs_dir: ./briefs

providers:
  confluence: { max_concurrent: 3 } # Atlassian MCP/Confluence rate risk
  figma: { max_concurrent: 2 }

db: ./pando.sqlite
