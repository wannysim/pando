# 단계별 엔진·모델 매핑 — docs/design-v2-multi-repo.md §4
# 전역 기본값. 레포별 오버라이드는 repos.yaml의 stages 키로 (추후).
# 모델명은 구축 시점 리더보드 확인 후 확정할 것 (research-v1 §5 주의사항)

stages:
  spec:
    engine: claude-code
    model: sonnet
    skills:
      jira: jira-context-gatherer
      brief: brief-intake
    allowed_tools: [Read, Glob, Grep, Task, mcp__claude_ai_Atlassian]

  plan:
    engine: claude-code
    model: opus
    skill: implement-jira
    allowed_tools: [Read, Glob, Grep, Write, "Bash(git *)", Task, mcp__claude_ai_Atlassian]
    env:
      IMPLEMENT_JIRA_BATCH: "1"

  test:
    engine: codex
    model: gpt-5-codex
    skill: test-writer

  impl:
    engine: codex
    model: gpt-5-codex

  review:
    engine: claude-code
    model: opus
    skill: verifier
    allowed_tools: [Read, Glob, Grep, "Bash(git *)"]

defaults:
  retry_budget: 10
  timeout_minutes: 30
