# RepoProfile 목록 — docs/design-v2-multi-repo.md §1
# 주의: 실제 게이트 명령은 각 레포에서 검증 후 확정할 것

repos:
  web:
    path: ~/Github/web
    scope: acme
    base_branch: develop
    work_item_source: jira
    context_providers: [atlassian-mcp, figma-mcp]
    conventions: acme-conventions
    setup: install   # web은 yarn@1 모노레포 (W1 검증에서 확인)
    gates:
      test: test
      lint: lint
      types: typecheck
    concurrency: 3
    port_range: [3100, 3199]
    env_files: [".env.local"]
    guards:
      protected_branches: [main, develop, "release/*"]
      forbid_test_edit_in_impl: true

  personal-site:
    path: ~/Github/personal-site
    scope: external
    base_branch: main
    work_item_source: brief
    context_providers: []
    conventions: repo-local
    package_manager: pnpm
    setup: install
    gates:
      test: test
      types: typecheck
    concurrency: 2
    port_range: [3200, 3299]
    guards:
      protected_branches: [main]
      forbid_test_edit_in_impl: true
