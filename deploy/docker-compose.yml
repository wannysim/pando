services:
  pando:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      # Opt-in, version-pinned worker CLI install (Dockerfile option B). Default
      # false keeps the base image lean and secret-free. Set
      # PANDO_INSTALL_WORKER_CLIS=true to bake codex into the image. It also
      # installs claude for legacy/custom profiles.
      # (required on a macOS host; the host Mach-O binaries cannot exec in the
      # linux container). Auth still comes from the mounted volumes below.
      args:
        INSTALL_WORKER_CLIS: "${PANDO_INSTALL_WORKER_CLIS:-false}"
        CLAUDE_CLI_VERSION: "${PANDO_CLAUDE_CLI_VERSION:-2.1.167}"
        CODEX_CLI_VERSION: "${PANDO_CODEX_CLI_VERSION:-0.137.0}"
    ports:
      - "${PANDO_PORT:-3210}:3210"
    environment:
      PANDO_HOST: "0.0.0.0"
      PANDO_PORT: "3210"
      PANDO_DB: "/data/pando.sqlite"
      PANDO_CONFIG_DIR: "/config"
      PANDO_ORCHESTRATOR_CONFIG: "/config/orchestrator.docker.yaml"
      PANDO_REPOS_CONFIG: "/config/repos.yaml"
      PANDO_STAGES_CONFIG: "/config/stages.yaml"
      PANDO_REPOS_ROOT: "/repos"
      PANDO_WORKTREE_ROOT: "/worktrees"
      PANDO_SKILLS_ROOT: "/skills"
      PANDO_STATIC_DASHBOARD_ROOT: "/app/dashboard/dist"
      PANDO_GLOBAL_CONCURRENCY: "${PANDO_GLOBAL_CONCURRENCY:-2}"
      # Worker credentials for live Docker workers. Empty by default so no secret
      # is committed and the HTTP-only skeleton is unaffected; values come from the
      # host env or an untracked .env file. OPENAI_API_KEY is the default Codex
      # path; ANTHROPIC_API_KEY is only for legacy/custom claude-code profiles.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - "pando-data:/data"
      - "${PANDO_REPOS_ROOT:-~/Github}:/repos"
      - "${PANDO_WORKTREE_ROOT:-~/.worktrees}:/worktrees"
      - "${PANDO_CONFIG_ROOT:-../config}:/config:ro"
      - "${PANDO_SKILLS_ROOT:-~/.ai-skills}:/skills:ro"
      # --- Worker readiness mounts (opt-in; uncomment to run live Docker workers) ---
      # These turn the HTTP/dashboard skeleton into a live-worker container. They
      # are commented out by default so the base image stays secret-free and the
      # HTTP smoke needs no host CLIs. See deploy/README.md "Worker readiness".
      #
      # 1) Worker CLIs on PATH (LINUX HOST ONLY). Mount the host bin holding
      #    `codex` read-only at /worker-bin (= PANDO_WORKER_BIN). Add `claude`
      #    there only for legacy/custom profiles.
      #    NOTE: only works when host and container share OS+arch. A macOS host
      #    ships Mach-O binaries that will NOT run in the linux container; install
      #    the CLI in the image instead (see deploy/README.md option B).
      # - "${PANDO_WORKER_BIN_ROOT:-~/.local/bin}:/worker-bin:ro"
      #
      # 2) Worker auth. NEVER bake auth into the image.
      #    Claude: mounted host files may not authenticate inside Docker on macOS;
      #    prefer ANTHROPIC_API_KEY or a container-local `claude /login` volume for
      #    live Docker workers. A read-only host-file mount is only a readiness
      #    signal and needs both ~/.claude and top-level ~/.claude.json. Do not set
      #    CLAUDE_CONFIG_DIR=/root/.claude for this host-file path; it can select a
      #    nested zero-byte config file instead of /root/.claude.json.
      # - "${PANDO_CLAUDE_CONFIG:-~/.claude}:/root/.claude:ro"
      # - "${PANDO_CLAUDE_CONFIG_FILE:-~/.claude.json}:/root/.claude.json:ro"
      #    Codex: CODEX_HOME must be writable because the CLI writes local state.
      # - "${PANDO_CODEX_CONFIG:-~/.codex}:/root/.codex"
      #
      # 3) Git credentials for push / PR creation. Pick ONE:
      #    a) Deploy key (preferred for a single repo): mount a read-only SSH key
      #       and a known_hosts file, then configure the repo remote to use SSH.
      # - "${PANDO_DEPLOY_KEY:-~/.ssh/pando_deploy_key}:/root/.ssh/id_ed25519:ro"
      # - "${PANDO_SSH_KNOWN_HOSTS:-~/.ssh/known_hosts}:/root/.ssh/known_hosts:ro"
      #    b) gh / HTTPS token via git credential store (host-managed, read-only):
      # - "${PANDO_GIT_CREDENTIALS:-~/.git-credentials}:/root/.git-credentials:ro"
      # - "${PANDO_GITCONFIG:-~/.gitconfig}:/root/.gitconfig:ro"
    # For Docker live workers, OPENAI_API_KEY / ANTHROPIC_API_KEY are forwarded
    # from the host env (or an untracked .env file) via the environment: block
    # above; both default to empty so no secret is committed. For Codex, set
    # CODEX_HOME: "/root/.codex" alongside the writable codex config mount.
    # For legacy Claude, use ANTHROPIC_API_KEY or a container-local login volume. See
    # deploy/README.md and docs/runbooks/two-job-smoke.md.
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'node -e "fetch(''http://127.0.0.1:3210/health'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pando-data:
